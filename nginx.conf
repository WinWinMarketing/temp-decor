server {
    listen 80;
    server_name nithiydecor.com www.nithiydecor.com;
    root /var/www/nithiy-decor;
    index index.html;

    # Redirect www to non-www
    if ($host = www.nithiydecor.com) {
        return 301 https://nithiydecor.com$request_uri;
    }

    # HTML pages — short cache, always revalidate
    location / {
        try_files $uri $uri/index.html $uri.html =404;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Hashed static assets (JS, CSS) — cache forever
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Images — cache for 30 days
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Fonts — cache for 1 year
    location ~* \.(woff2|woff|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml
        text/xml;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Custom 404
    error_page 404 /404.html;
}
